# PVRIG_RFAb_v0_B_bb015_mpn01 VHH to PVRIG 8X6B full-interface-guided HADDOCK3 docking
# Boundary: guided_docking_geometry_proxy_not_binding_or_blocker_proof
# Restraint policy: all_cdr_residues_to_full_8x6b_interface_hotspot_union_confirmatory
run_dir = "run_PVRIG_RFAb_v0_B_bb015_mpn01_pvrig_hotspot"
mode = "local"
ncores = 4

molecules = [
    "data/PVRIG_RFAb_v0_B_bb015_mpn01_vhh_chainA.pdb",
    "data/pvrig_8x6b_chainB.pdb",
]

[topoaa]

[rigidbody]
ambig_fname = "data/PVRIG_RFAb_v0_B_bb015_mpn01_cdr_to_pvrig_hotspot_ambig.tbl"
tolerance = 5
sampling = 40

[seletop]
select = 10

[flexref]
tolerance = 10
ambig_fname = "data/PVRIG_RFAb_v0_B_bb015_mpn01_cdr_to_pvrig_hotspot_ambig.tbl"

[emref]
ambig_fname = "data/PVRIG_RFAb_v0_B_bb015_mpn01_cdr_to_pvrig_hotspot_ambig.tbl"

[clustfcc]
min_population = 1

[seletopclusts]
top_models = 4
